function renderPayStep(){return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;"><h2 style="font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,30px);">Application Form</h2><button onclick="closeApply()" style="background:none;border:none;color:rgba(244,240,228,.4);font-size:22px;cursor:pointer;">✕</button></div>${progressHTML(1)}<div style="font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#c8960c;display:flex;align-items:center;gap:12px;margin-bottom:18px;">Step 1<div style="width:36px;height:1px;background:#c8960c;"></div></div><h2 style="font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,28px);margin-bottom:8px;">Payment Confirmation</h2><p style="font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(244,240,228,.65);margin-bottom:28px;line-height:1.7;">Pay the ₦10,000 application form fee then confirm to proceed.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;"><div class="pay-option ${applyData.payMethod==='bank'?'selected':''}" onclick="selectPay('bank')"><h4 style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#c8960c;margin-bottom:12px;">🏦 Bank Transfer</h4><div style="font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.9;color:rgba(244,240,228,.6);"><b style="color:#c8960c;">Bank:</b> Stanbic IBTC Bank<br><b style="color:#c8960c;">Account No:</b> 00077543682<br><b style="color:#c8960c;">Name:</b> OCROWN University<br><b style="color:#c8960c;">Amount:</b> ₦10,000</div></div><div class="pay-option ${applyData.payMethod==='card'?'selected':''}" onclick="selectPay('card')"><h4 style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#c8960c;margin-bottom:12px;">💳 Card Payment</h4><p style="font-family:'Cormorant Garamond',serif;font-size:15px;color:rgba(244,240,228,.65);margin-bottom:14px;">Pay securely online with your debit/credit card.</p><div style="background:rgba(244,240,228,.05);border:1px solid rgba(244,240,228,.1);padding:12px;text-align:center;"><div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#c8960c;">₦10,000</div></div></div></div><div style="margin-bottom:18px;"><label>Payment Reference (optional)</label><input type="text" id="payRef" placeholder="e.g. TRX123456789"/></div><div style="display:flex;gap:12px;flex-wrap:wrap;"><button onclick="closeApply()" class="btn-outline">Cancel</button><button class="btn-gold" onclick="nextToForm()" style="opacity:${applyData.payMethod?1:.5};">I Have Paid — Continue →</button></div>`;}
function selectPay(m){applyData.payMethod=m;renderApply();}
function nextToForm(){if(!applyData.payMethod){alert('Please select a payment method.');return;}applyStep=2;renderApply();}
function renderFormStep(){const courseOpts=COURSES.map(c=>`<option value="${c}">${c}</option>`).join('');const stateOpts=STATES.map(s=>`<option value="${s}">${s}</option>`).join('');return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;"><h2 style="font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,28px);">Application Form</h2><button onclick="closeApply()" style="background:none;border:none;color:rgba(244,240,228,.4);font-size:22px;cursor:pointer;">✕</button></div>${progressHTML(2)}<h3 style="font-family:'Playfair Display',serif;font-size:18px;color:#c8960c;margin-bottom:16px;">Personal Information</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;"><div class="field"><label>First Name *</label><input id="f_firstName" placeholder="e.g. Chidi"/></div><div class="field"><label>Last Name *</label><input id="f_lastName" placeholder="e.g. Okafor"/></div><div class="field"><label>Date of Birth *</label><input id="f_dob" type="date"/></div><div class="field"><label>Gender *</label><select id="f_gender"><option value="">Select...</option><option>Male</option><option>Female</option></select></div><div class="field"><label>Email *</label><input id="f_email" type="email" placeholder="your@email.com"/></div><div class="field"><label>Phone *</label><input id="f_phone" placeholder="07012345678"/></div><div class="field"><label>State of Origin *</label><select id="f_state"><option value="">Select...</option>${stateOpts}</select></div><div class="field"><label>LGA *</label><input id="f_lga" placeholder="e.g. Ifo"/></div></div><div class="field"><label>Address</label><textarea id="f_address" rows="3" placeholder="Your full address..."></textarea></div><h3 style="font-family:'Playfair Display',serif;font-size:18px;color:#c8960c;margin:20px 0 16px;">Academic Information</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;"><div class="field"><label>JAMB Reg No. *</label><input id="f_jamb" placeholder="e.g. 12345678AB"/></div><div class="field"><label>JAMB Score *</label><input id="f_jambScore" type="number" placeholder="e.g. 240"/></div><div class="field" style="grid-column:span 2;"><label>Programme of Choice *</label><select id="f_course"><option value="">Select...</option>${courseOpts}</select></div><div class="field"><label>O Level Type *</label><select id="f_olevel"><option value="">Select...</option><option>WAEC</option><option>NECO</option><option>NABTEB</option><option>GCE</option><option>Others</option></select></div><div class="field"><label>Year of Graduation *</label><input id="f_year" type="number" placeholder="e.g. 2024"/></div><div class="field" style="grid-column:span 2;"><label>Previous School *</label><input id="f_institution" placeholder="Name of your secondary school"/></div></div><h3 style="font-family:'Playfair Display',serif;font-size:18px;color:#c8960c;margin:20px 0 16px;">Guardian / Next of Kin</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;"><div class="field"><label>Guardian Name</label><input id="f_guardian" placeholder="e.g. Mr. John Okafor"/></div><div class="field"><label>Guardian Phone</label><input id="f_guardianPhone" placeholder="07012345678"/></div></div><h3 style="font-family:'Playfair Display',serif;font-size:18px;color:#c8960c;margin:20px 0 16px;">Personal Statement</h3><div class="field"><label>Why OCROWN University?</label><textarea id="f_essay" rows="5" placeholder="Tell us about yourself and your goals..."></textarea></div><div id="formError" style="background:rgba(139,26,26,.15);border:1px solid rgba(139,26,26,.3);padding:12px 16px;margin-bottom:18px;display:none;font-family:'DM Sans',sans-serif;font-size:13px;color:#e05555;"></div><div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn-outline" onclick="applyStep=1;renderApply()">← Back</button><button class="btn-gold" onclick="submitApp()">Submit Application →</button></div>`;}
function submitApp(){const get=id=>document.getElementById(id)?.value?.trim()||'';const required=['f_firstName','f_lastName','f_dob','f_gender','f_email','f_phone','f_state','f_lga','f_jamb','f_jambScore','f_course','f_olevel','f_year','f_institution'];const missing=required.filter(id=>!get(id));if(missing.length){document.getElementById('formError').style.display='block';document.getElementById('formError').textContent=`Please fill in all required fields (${missing.length} missing).`;return;}if(!/\S+@\S+\.\S+/.test(get('f_email'))){document.getElementById('formError').style.display='block';document.getElementById('formError').textContent='Please enter a valid email address.';return;}const id='OCU-'+Date.now().toString().slice(-6);const apps=getApps();apps.push({id,firstName:get('f_firstName'),lastName:get('f_lastName'),dob:get('f_dob'),gender:get('f_gender'),email:get('f_email'),phone:get('f_phone'),state:get('f_state'),lga:get('f_lga'),address:get('f_address'),jamb:get('f_jamb'),jambScore:get('f_jambScore'),course:get('f_course'),olevel:get('f_olevel'),year:get('f_year'),institution:get('f_institution'),guardian:get('f_guardian'),guardianPhone:get('f_guardianPhone'),essay:get('f_essay'),payMethod:applyData.payMethod,status:'pending',date:new Date().toLocaleDateString('en-NG'),replies:[]});saveApps(apps);applyData.appId=id;applyStep=3;renderApply();}
function renderSuccessStep(){return`<div style="text-align:center;padding:48px 0;"><div style="font-size:56px;margin-bottom:20px;">🎉</div><h2 style="font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,38px);margin-bottom:14px;">Application Submitted!</h2><p style="font-family:'Cormorant Garamond',serif;font-size:17px;color:rgba(244,240,228,.7);margin-bottom:28px;line-height:1.7;max-width:480px;margin-left:auto;margin-right:auto;">Your application has been submitted to OCROWN University. You will be contacted via email and phone with next steps.</p><div style="background:rgba(200,150,12,.08);border:1px solid rgba(200,150,12,.25);padding:20px 28px;display:inline-block;margin-bottom:28px;"><div style="font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#c8960c;margin-bottom:6px;">Your Application ID</div><div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;">${applyData.appId}</div><div style="font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(244,240,228,.4);margin-top:4px;">Keep this for your records</div></div><br><div style="font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(244,240,228,.5);margin-bottom:28px;">Enquiries: <b style="color:#f4f0e4;">oladejiridwanopeyemi@gmail.com</b> | <b style="color:#f4f0e4;">07080951392</b></div><button class="btn-gold" onclick="closeApply()">Return to Website</button></div>`;}
